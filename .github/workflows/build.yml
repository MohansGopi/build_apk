name: Build DocAssist APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 virtualenv

      - name: Set up Android SDK
        run: |
          ANDROID_SDK_ROOT="$HOME/.android/sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/cmdtools /tmp/cmdline-tools.zip

          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          # Accept all licenses
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

          # Install required components
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "ndk;25.2.9519653"

          # ── KEY FIX ──────────────────────────────────────────────────
          # Buildozer looks for sdkmanager at tools/bin/sdkmanager (old path).
          # Create that path as a symlink to the modern cmdline-tools binary.
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" \
            "$ANDROID_SDK_ROOT/tools/bin/avdmanager"
          # Also symlink the entire tools/lib for any other old-path lookups
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools/latest/lib" \
            "$ANDROID_SDK_ROOT/tools/lib" || true
          # ─────────────────────────────────────────────────────────────

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/33.0.2" >> $GITHUB_PATH

      - name: Point buildozer at pre-installed SDK/NDK
        run: |
          ANDROID_SDK_ROOT="$HOME/.android/sdk"
          mkdir -p "$HOME/.buildozer/android/platform"

          # Symlink SDK and NDK into buildozer's expected locations
          ln -sfn "$ANDROID_SDK_ROOT" \
            "$HOME/.buildozer/android/platform/android-sdk"
          ln -sfn "$ANDROID_SDK_ROOT/ndk/25.2.9519653" \
            "$HOME/.buildozer/android/platform/android-ndk-r25b"

          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=26" >> $GITHUB_ENV

      - name: Cache buildozer and SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/cache
            ~/.android/sdk
          key: buildozer-v6-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v6-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DocAssist-debug-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
