name: Build DocAssist APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Checkout your code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      # ── 4. Set JAVA_HOME ──────────────────────────────────────────────
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      # ── 5. Install Python build tools ─────────────────────────────────
      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 virtualenv

      # ── 6. Cache Android SDK / NDK / p4a (speeds up repeat builds) ───
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ── 7. Build the APK ──────────────────────────────────────────────
      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # ── 8. Upload APK as artifact ─────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DocAssist-debug-APK
          path: bin/*.apk
          retention-days: 30

      # ── 9. Upload build log (even on failure, for debugging) ──────────
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
