name: Build DocAssist APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Checkout your code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libltdl-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      # ── 4. Set JAVA_HOME ──────────────────────────────────────────────
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      # ── 5. Install Python build tools ─────────────────────────────────
      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 virtualenv

      # ── 6. Pre-accept all Android SDK licenses ────────────────────────
      # This is the key step — without it sdkmanager skips everything
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Download the newer cmdline-tools so sdkmanager works properly
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdline-tools.zip
          mkdir -p ~/.android/sdk/cmdline-tools
          unzip -q /tmp/cmdline-tools.zip -d ~/.android/sdk/cmdline-tools
          mv ~/.android/sdk/cmdline-tools/cmdline-tools \
             ~/.android/sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=~/.android/sdk
          export PATH=$PATH:~/.android/sdk/cmdline-tools/latest/bin
          # Accept all licenses non-interactively
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          # Install required SDK components
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "~/.android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "~/.android/sdk/platform-tools" >> $GITHUB_PATH

      # ── 7. Cache Android SDK / NDK / p4a (speeds up repeat builds) ───
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android/sdk
          key: buildozer-sdk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-sdk-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ── 7. Build the APK ──────────────────────────────────────────────
      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # ── 8. Upload APK as artifact ─────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DocAssist-debug-APK
          path: bin/*.apk
          retention-days: 30

      # ── 9. Upload build log (even on failure, for debugging) ──────────
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
